<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" width="960" height="330">
  <defs>
    <linearGradient id="fade3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4b2e2b" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#4b2e2b" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#4b2e2b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4b2e2b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fade1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8c5a3c" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#8c5a3c" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#8c5a3c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8c5a3c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Light cream background -->
  <rect width="960" height="330" fill="#fff8f0" rx="6"/>

  <!-- ══════════════════════════
       CROWN — outline style (V1)
       ══════════════════════════ -->
  <!-- Base band outline -->
  <rect x="388" y="76" width="184" height="16" rx="2.5" fill="none" stroke="#8c5a3c" stroke-width="2"/>
  <!-- Pearl dots on base -->
  <circle cx="400" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="414" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="428" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="442" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="456" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="470" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="484" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="498" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="512" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="526" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="540" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="554" cy="84" r="2.2" fill="#8c5a3c"/>
  <circle cx="568" cy="84" r="2.2" fill="#8c5a3c"/>

  <!-- Left fleur spike -->
  <path d="M395,76 L395,50 Q395,40 403,40 Q411,40 411,50 L411,76"
        fill="none" stroke="#8c5a3c" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="403" cy="36" r="4" fill="#8c5a3c"/>

  <!-- Left-mid arch -->
  <path d="M422,76 L422,54 Q422,44 432,44 Q442,44 442,54 L442,76"
        fill="none" stroke="#8c5a3c" stroke-width="1.8"/>

  <!-- Center tall arch -->
  <path d="M452,76 L452,30 Q452,14 480,14 Q508,14 508,30 L508,76"
        fill="none" stroke="#4b2e2b" stroke-width="2.2"/>
  <circle cx="480" cy="9" r="5.5" fill="#c08552"/>

  <!-- Right-mid arch -->
  <path d="M518,76 L518,54 Q518,44 528,44 Q538,44 538,54 L538,76"
        fill="none" stroke="#8c5a3c" stroke-width="1.8"/>

  <!-- Right fleur spike -->
  <path d="M549,76 L549,50 Q549,40 557,40 Q565,40 565,50 L565,76"
        fill="none" stroke="#8c5a3c" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="557" cy="36" r="4" fill="#8c5a3c"/>

  <!-- ══════════════════════════
       DECORATIVE LINES
       ══════════════════════════ -->
  <line x1="80" y1="106" x2="880" y2="106" stroke="url(#fade3)" stroke-width="0.9"/>
  <line x1="80" y1="110" x2="880" y2="110" stroke="url(#fade1)" stroke-width="0.4"/>

  <!-- ══════════════════════════
       MAIN TITLE
       ══════════════════════════ -->
  <text x="480" y="200"
    text-anchor="middle"
    font-family="'Didot','Bodoni MT','Playfair Display','Georgia',serif"
    font-size="96" font-weight="700" letter-spacing="8"
    fill="#4b2e2b">KONTYNENT</text>

  <!-- ══════════════════════════
       BOTTOM DECORATIVE LINES
       ══════════════════════════ -->
  <line x1="80" y1="218" x2="880" y2="218" stroke="url(#fade3)" stroke-width="0.9"/>
  <line x1="80" y1="222" x2="880" y2="222" stroke="url(#fade1)" stroke-width="0.4"/>

  <!-- ══════════════════════════
       SUBTITLE
       ══════════════════════════ -->
  <text x="480" y="272"
    text-anchor="middle"
    font-family="'Futura','Century Gothic','Trebuchet MS',sans-serif"
    font-size="13" font-weight="400" letter-spacing="18"
    fill="#8c5a3c">HOTEL  COMPLEX</text>

  <line x1="370" y1="284" x2="590" y2="284" stroke="#c08552" stroke-width="0.8"/>
</svg>
